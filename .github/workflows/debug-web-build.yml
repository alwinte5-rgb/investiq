name: debug-web-build
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/debug-web-build.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
      - name: Versions
        run: node -v && npm -v
      - name: Install (same as Railway)
        run: npm ci --no-audit --no-fund
      - name: How many physical react copies?
        run: |
          echo "--- react package.json copies on disk ---"
          find . -path '*/node_modules/react/package.json' -not -path '*/next/*' | head -20
          echo "--- npm ls react / react-dom ---"
          npm ls react react-dom 2>&1 | head -40 || true
      - name: Native SWC installed for linux?
        run: ls node_modules/@next/ 2>/dev/null | grep swc || echo "NO @next/swc-* in node_modules"
      - name: Build web (reproduce Railway)
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dmVyYi1ub3VuLTEyLmNsZXJrLmFjY291bnRzLmRldiQ
          CLERK_SECRET_KEY: sk_test_debugplaceholder
        run: npm run -w @investiq/web build
